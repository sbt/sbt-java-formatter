name: CI
on:
  pull_request:
  push:
  # schedule:
  # # 2am EST every Saturday
  # - cron: '0 7 * * 6'
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            java: 11
            distribution: zulu
            jobtype: 1
          - os: ubuntu-latest
            java: 17
            distribution: zulu
            jobtype: 2
          - os: ubuntu-latest
            java: 21
            distribution: zulu
            jobtype: 3
          - os: ubuntu-latest
            java: 25
            distribution: zulu
            jobtype: 4
          - os: ubuntu-latest
            java: 11
            distribution: zulu
            jobtype: 5
    runs-on: ${{ matrix.os }}
    env:
      # define Java options for both official sbt and sbt-extras
      JAVA_OPTS: -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8
      JVM_OPTS:  -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: "${{ matrix.distribution }}"
        java-version: "${{ matrix.java }}"
        cache: sbt
    - name: Setup formatter JDK
      if: ${{ matrix.jobtype == 5 }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: "25"
    - uses: sbt/setup-sbt@v1
    - name: Build and test (sbt 1.x)
      if: ${{ matrix.jobtype == 1 }}
      shell: bash
      run: sbt -v '++ 2.12.x' clean scalafmtSbtCheck scalafmtCheckAll test 'scripted sbt-java-formatter/*' 'scripted java-runtime/compatible-11'
    - name: Build and test (sbt 2.x)
      if: ${{ matrix.jobtype == 2 }}
      shell: bash
      run: sbt -v '++ 3.x' clean scalafmtSbtCheck scalafmtCheckAll test 'scripted sbt-java-formatter/*' 'scripted java-runtime/compatible-17' 'scripted java-runtime/incompatible-21-on-java-17'
    - name: Build and test (sbt 2.x, Java 21)
      if: ${{ matrix.jobtype == 3 }}
      shell: bash
      run: sbt -v '++ 3.x' clean scalafmtSbtCheck scalafmtCheckAll test 'scripted sbt-java-formatter/*' 'scripted java-runtime/compatible-21'
    - name: Build and test (sbt 2.x, Java 25)
      if: ${{ matrix.jobtype == 4 }}
      shell: bash
      run: sbt -v '++ 3.x' clean scalafmtSbtCheck scalafmtCheckAll test 'scripted sbt-java-formatter/*' 'scripted java-runtime/compatible-21'
    - name: Build and test (sbt 1.x, Java 11 with formatter on Java 25)
      if: ${{ matrix.jobtype == 5 }}
      shell: bash
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}
        SBT_JAVAFMT_JAVA_HOME: ${{ env.JAVA_HOME_25_X64 }}
      run: |
        export PATH="${JAVA_HOME}/bin:$PATH"
        sbt -v '++ 2.12.x' clean scalafmtSbtCheck scalafmtCheckAll test 'scripted sbt-java-formatter/*' 'scripted java-runtime/compatible-21'
